app = "ai-brand-scale"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8766
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/app/.tmp"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
